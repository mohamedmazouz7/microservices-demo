name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ====== TEST STAGE ======
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Run Go tests
      run: |
        for dir in src/frontend src/productcatalogservice src/checkoutservice src/shippingservice; do
          if [ -d "$dir" ]; then
            echo "Testing $dir..."
            cd "$dir"
            go test -v -race -coverprofile=coverage.out ./... || exit 1
            cd - > /dev/null
          fi
        done
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Run Node tests
      run: |
        for dir in src/currencyservice src/paymentservice; do
          if [ -d "$dir" ] && [ -f "$dir/package.json" ]; then
            echo "Testing $dir..."
            cd "$dir"
            npm ci
            npm test -- --coverage || exit 1
            cd - > /dev/null
          fi
        done
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Run Python tests
      run: |
        for dir in src/emailservice src/recommendationservice; do
          if [ -d "$dir" ] && [ -f "$dir/requirements.txt" ]; then
            echo "Testing $dir..."
            cd "$dir"
            pip install -r requirements.txt
            pip install pytest pytest-cov
            pytest --cov || exit 1
            cd - > /dev/null
          fi
        done

  # ====== BUILD STAGE ======
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    
    strategy:
      fail-fast: false
      matrix:
        service:
          - frontend
          - cartservice
          - productcatalogservice
          - currencyservice
          - paymentservice
          - shippingservice
          - emailservice
          - checkoutservice
          - recommendationservice
          - adservice
          - loadgenerator
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ./src/${{ matrix.service }}
        file: ./src/${{ matrix.service }}/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ====== DEPLOY TO DEV ======
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: https://dev.boutique.local
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.27.0'
    
    - name: Configure kubectl
      env:
        KUBECONFIG_CONTENT: ${{ secrets.KUBE_CONFIG_DEV }}
      run: |
        mkdir -p $HOME/.kube
        echo "$KUBECONFIG_CONTENT" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config
        kubectl cluster-info
    
    - name: Deploy with Kustomize
      run: |
        kubectl apply -k kubernetes/overlays/dev
        echo "Waiting for rollout..."
        kubectl rollout status deployment/frontend -n online-boutique --timeout=5m || true
    
    - name: Verify deployment
      run: |
        kubectl get pods -n online-boutique
        kubectl get svc -n online-boutique
    
    - name: Notify Slack (on success)
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: '✅ Dev deployment successful'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # ====== DEPLOY TO PROD ======
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://boutique.example.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.27.0'
    
    - name: Configure kubectl
      env:
        KUBECONFIG_CONTENT: ${{ secrets.KUBE_CONFIG_PROD }}
      run: |
        mkdir -p $HOME/.kube
        echo "$KUBECONFIG_CONTENT" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config
        kubectl cluster-info
    
    - name: Get current deployment
      id: current
      run: |
        CURRENT=$(kubectl get deployment frontend -n online-boutique -o jsonpath='{.spec.template.spec.containers[0].image}')
        echo "current_image=$CURRENT" >> $GITHUB_OUTPUT
    
    - name: Deploy with Kustomize
      run: |
        kubectl apply -k kubernetes/overlays/production
        echo "Waiting for rollout..."
        kubectl rollout status deployment/frontend -n online-boutique --timeout=10m
    
    - name: Smoke Tests
      run: |
        FRONTEND_IP=$(kubectl get svc frontend -n online-boutique -o jsonpath='{.status.loadBalancer.ingress[0].ip}' || echo "localhost")
        echo "Testing frontend at $FRONTEND_IP..."
        
        for i in {1..10}; do
          echo "Attempt $i..."
          curl -f "http://$FRONTEND_IP/" && break || sleep 5
        done
    
    - name: Verify Pod Health
      run: |
        # Verify all pods are ready
        kubectl get pods -n online-boutique
        kubectl get pods -n online-boutique -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.conditions[?(@.type=="Ready")].status}{"\n"}{end}'
    
    - name: Rollback on Failure
      if: failure()
      run: |
        echo "⚠️ Deployment failed, rolling back..."
        kubectl rollout undo deployment/frontend -n online-boutique
        kubectl rollout status deployment/frontend -n online-boutique --timeout=5m
        exit 1
    
    - name: Notify Success
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: custom
        custom_payload: |
          {
            text: '✅ Production deployment successful',
            attachments: [{
              color: 'good',
              text: `Image: ${{ github.repository }}@${{ github.sha }}`,
              fields: [
                { title: 'Previous', value: '${{ steps.current.outputs.current_image }}', short: true },
                { title: 'Current', value: '${{ github.sha }}', short: true }
              ]
            }]
          }
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
    
    - name: Notify Failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: custom
        custom_payload: |
          {
            text: '❌ Production deployment failed',
            attachments: [{
              color: 'danger',
              text: 'Rolled back to previous version'
            }]
          }
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # ====== SECURITY SCAN ======
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: 'src'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
    
    - name: Run Hadolint (Docker linting)
      uses: hadolint/hadolint-action@v3
      with:
        dockerfile: src/*/Dockerfile
        failure-threshold: warning
