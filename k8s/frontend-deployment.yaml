# Frontend Deployment Manifest
# This file tells Kubernetes HOW to run the frontend microservice
# Think of it as: "Run N copies of this container with these settings"

apiVersion: apps/v1  # Kubernetes API version for Deployments
kind: Deployment     # We're creating a Deployment (manages Pods automatically)

metadata:
  name: frontend             # The name of this deployment (you'll use this to manage it)
  labels:
    app: frontend            # Label: helps organize and select this deployment
    version: v1              # Label: useful for tracking versions

spec:
  replicas: 2                # "I want 2 copies of the frontend running at all times"
                             # If one crashes, Kubernetes automatically starts a new one

  selector:
    matchLabels:
      app: frontend          # "Match Pods that have label 'app: frontend'"
                             # This tells the Deployment which Pods it manages

  template:                  # Template for creating new Pods
    metadata:
      labels:
        app: frontend        # Pod gets this label (so the selector finds it)
        version: v1

    spec:
      containers:
      - name: frontend       # Name of this container inside the Pod
        image: gcr.io/google-samples/microservices-demo/frontend:v0.3.9
                             # "Use this Docker image" (usually in a registry like Docker Hub or GCP)
                             # v0.3.9 is the version tag
        
        ports:
        - name: http         # Name this port for reference
          containerPort: 8080  # The port inside the container where app listens
          protocol: TCP

        # Environment variables the app needs
        env:
        - name: PORT
          value: "8080"      # Frontend listens on this port (from main.go)

        # Resource limits - tell Kubernetes how much CPU/memory this container needs
        resources:
          requests:
            cpu: 100m        # "I need at least 100 millicpu (0.1 CPU)"
            memory: 64Mi     # "I need at least 64 Megabytes of RAM"
          limits:
            cpu: 200m        # "Don't give me more than 200 millicpu"
            memory: 128Mi    # "Don't give me more than 128MB" (if exceeded, Pod restarts)

        # Readiness Probe - "Is the app ready to serve traffic?"
        # Kubernetes waits for this to succeed before sending traffic
        readinessProbe:
          httpGet:           # Check by making an HTTP GET request
            path: /          # To the root path "/"
            port: 8080       # On port 8080
          initialDelaySeconds: 10  # Wait 10 seconds before first check
          periodSeconds: 5         # Check every 5 seconds
          timeoutSeconds: 2        # Wait max 2 seconds for response
          successThreshold: 1      # Need 1 successful check to be "ready"
          failureThreshold: 3      # After 3 failures, mark as not ready

        # Liveness Probe - "Is the app still alive or crashed?"
        # If this fails repeatedly, Kubernetes restarts the Pod
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15  # Wait 15 seconds before first check
          periodSeconds: 10        # Check every 10 seconds
          timeoutSeconds: 2
          failureThreshold: 3      # Restart after 3 failures

        # Tell Kubernetes how to shutdown gracefully
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]  # Wait 5 sec before killing container
                             # Gives requests 5 seconds to finish

      # Pod-level settings
      terminationGracePeriodSeconds: 30  # Wait max 30 sec for Pod to shutdown
                                         # (preStop + time to stop processes)
      restartPolicy: Always              # Always restart crashed Pods
