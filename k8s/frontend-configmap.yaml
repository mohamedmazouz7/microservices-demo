# ConfigMap for Frontend Environment Variables
# ConfigMaps are Kubernetes objects that store configuration data
# Think of it as: "Store all the config settings separately from the container image"
#
# Why separate config? 
# - Same image works in dev, staging, production (just different ConfigMap)
# - Easier to update config without rebuilding Docker image
# - Secrets stay secure in different object (Secret, not ConfigMap)

apiVersion: v1
kind: ConfigMap

metadata:
  name: frontend-config    # Name this ConfigMap
  labels:
    app: frontend

data:
  # Key: value pairs - these become environment variables when referenced in Pod
  
  # Service endpoints - where other microservices are located
  # Inside cluster, services are accessible via: <service-name>.<namespace>.svc.cluster.local
  # Usually just: <service-name> (in same namespace)
  
  PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"
  CURRENCY_SERVICE_ADDR: "currencyservice:7000"
  CART_SERVICE_ADDR: "cartservice:7070"
  CHECKOUT_SERVICE_ADDR: "checkoutservice:5050"
  SHIPPING_SERVICE_ADDR: "shippingservice:50051"
  AD_SERVICE_ADDR: "adservice:9555"
  RECOMMENDATION_SERVICE_ADDR: "recommendationservice:8080"

  # Environment type
  ENVIRONMENT: "production"

  # Logging
  LOG_LEVEL: "info"

# Usage in Deployment:
# In the frontend-deployment.yaml, under containers[].env, you can reference these:
#
# env:
# - name: PRODUCT_CATALOG_SERVICE_ADDR
#   valueFrom:
#     configMapKeyRef:
#       name: frontend-config        # Use this ConfigMap
#       key: PRODUCT_CATALOG_SERVICE_ADDR  # Get this key's value
#
# Then inside the container, env var $PRODUCT_CATALOG_SERVICE_ADDR has the value
